# Cohort configuration for et-fus-vbm
# Paths are relative to the repo root unless absolute.

# deepmriprep output (symlinked as ./data) and its manifest CSV
data_root: data
manifest_csv: data/deepmriprep_outputs.csv

# Pre-computed SUIT cerebellar lobular volumes (28 lobules + rollups), ~525 scans.
# Lives outside the repo; referenced by absolute-or-relative path.
cerebellar_csv: ../cerebellar_volumes.csv

# Clinical metadata (treated side, tremor scores, adverse effects). A template is
# generated by `python -m etfvbm.io --write-clinical-template` if this file is absent.
clinical_csv: config/clinical.csv

# Where all derived maps/tables/figures go (gitignored)
derivatives: derivatives

# Upstream Calvinwhow/vbm assets (populated by scripts/fetch_upstream.sh)
upstream_root: external/vbm
mni_mask: external/vbm/assets/MNI152_T1_2mm_brain_mask.nii
ctrl_dist: external/vbm/assets/ctrl_dist        # GM/WM mean+std at 2 mm MNI
roi_dir: external/vbm/rois                       # ROI atlases for regional tables

# Session -> timepoint mapping. Pre-op is the within-subject reference (Path C).
reference_session: ses-preop
post_sessions:
  - ses-post24h
  - ses-post3mo
  - ses-post1yr

# Optional demographics table for GLM covariates (Path B).
# CSV with columns: subject, age, sex  (subject like "ET001"). Leave null if absent.
demographics_csv: null

# QC thresholds (scans failing these are flagged, not auto-dropped).
qc:
  # |affine_loss| and warp_mse are deepmriprep registration metrics; large = suspect.
  affine_loss_abs_max: 1.0       # tune from the QC report's distribution
  warp_mse_max: 0.05             # tune from the QC report's distribution
  tiv_sd_outlier: 4.0            # flag TIV > this many SD from the cohort mean

# Statistics
smoothing_fwhm: 8                # Path B uses deepmriprep's s8mwp1 (already 8 mm)
n_permutations: 5000             # Paths B/C permutation inference
z_threshold: 2.0                 # Path A atrophy threshold (|z| > 2)
